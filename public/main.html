                </div>
                <div class="card-filters">
                    <button class="filter-btn original active" onclick="applyFilter('video1','original',this)">ORIGINAL</button>
                    <button class="filter-btn blur"      onclick="applyFilter('video1','blur',this)">BLUR</button>
                    <button class="filter-btn pixelated" onclick="applyFilter('video1','pixelated',this)">SAT</button>
                    <button class="filter-btn thermal"   onclick="applyFilter('video1','thermal',this)">TERM</button>
                    <button class="filter-btn cold"      onclick="applyFilter('video1','cold',this)">FRÍO</button>

                        <i class="fa-solid fa-upload"></i>
                        <input type="file" accept="video/*" onchange="uploadVideo('video1',this)">
                    </label>

                <div class="card-media">
                    <div class="video-wrapper">
                        <video id="video1" loop muted playsinline>
